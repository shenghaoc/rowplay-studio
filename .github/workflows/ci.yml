name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # RowPlayCore: Pure Swift domain logic — test on Linux for cross-platform validation
  core-linux:
    name: RowPlayCore (Linux)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - name: Verify Swift version
        run: swift --version
      - name: Install SQLite3 development libraries
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev
      - name: Test RowPlayCore
        run: swift test

  # Full stack: macOS-only targets (RowPlayPlatform + RowPlayStudio)
  macos:
    name: macOS (Full Stack)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7
      - name: Verify Swift version
        run: swift --version
      - name: Test
        run: swift test
      - name: Build
        run: swift build
