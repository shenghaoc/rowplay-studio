name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # RowPlayCore: Pure Swift domain logic — test on Linux for cross-platform validation
  core-linux:
    name: RowPlayCore (Linux)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - name: Verify Swift 6.3.3
        run: |
          swift --version
          swift --version | grep -F 'Swift version 6.3.3'
      - name: Install SQLite3 development libraries
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev
      - name: Build RowPlayCore
        run: swift build --target RowPlayCore -Xswiftc -warnings-as-errors
      - name: Test RowPlayCore
        run: swift test --filter RowPlayCoreTests -Xswiftc -warnings-as-errors

  # Full stack: macOS-only targets (RowPlayPlatform + RowPlayStudio)
  macos:
    name: macOS (Full Stack)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7
      - name: Select Xcode 26.6
        run: sudo xcode-select -s /Applications/Xcode_26.6.app/Contents/Developer
      - name: Verify Swift 6.3.3
        run: |
          swift --version
          swift --version | grep -F 'Swift version 6.3.3'
      - name: Test
        run: swift test -Xswiftc -warnings-as-errors
      - name: Build
        run: swift build -Xswiftc -warnings-as-errors
